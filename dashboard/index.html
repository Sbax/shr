<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Radio Dashboard</title>
    <link rel="stylesheet" href="./dashboard-resources/style.css" />
</head>

<body>
    <div class="card">
        <div class="status">
            <span class="dot" id="dot"></span>
            <span id="status-text">Connecting…</span>
        </div>
        <h1 id="name">Radio</h1>
        <p class="desc" id="description"></p>

        <div class="now-playing-label">Now playing</div>
        <div class="title" id="title">—</div>

        <div class="player">
            <button class="play-btn" id="play-btn" type="button" aria-label="Play">
                <svg class="icon-play" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M8 5v14l11-7z" />
                </svg>
                <svg class="icon-pause" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M6 5h4v14H6zM14 5h4v14h-4z" />
                </svg>
            </button>

            <div class="volume">
                <button class="mute-btn" id="mute-btn" type="button" aria-label="Mute">
                    <svg class="icon-volume" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M3 9v6h4l5 5V4L7 9H3z" />
                        <path d="M16 8a5 5 0 0 1 0 8" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                    </svg>
                    <svg class="icon-muted" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M3 9v6h4l5 5V4L7 9H3z" />
                        <path d="M16 9l6 6M22 9l-6 6" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                    </svg>
                </button>
                <input class="volume-slider" id="volume" type="range" min="0" max="1" step="0.01" value="1"
                    aria-label="Volume" />
            </div>
        </div>

        <div class="equalizer" id="equalizer"></div>

        <audio id="player" preload="none" src="/radio.mp3"></audio>
    </div>

    <script src="./dashboard-resources/radio.js"></script>
    <script src="./dashboard-resources/visualizer.js"></script>
</body>

</html>
